apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: langchain-qa-ingress
spec:
  rules:
    - host: langchain-qa.example.com
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: langchain-qa-backend-service
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: langchain-qa-frontend-service
                port:
                  number: 80
