apiVersion: v1
kind: Service
metadata:
  name: langchain-qa-backend-service
spec:
  selector:
    app: langchain-qa-backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: langchain-qa-frontend-service
spec:
  selector:
    app: langchain-qa-frontend
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
